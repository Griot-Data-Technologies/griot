name: python-wheels

# Build pip-installable wheels (no Rust required to *use* them). Triggered on
# `py-v*` tags or manually. Wheels are uploaded as artifacts; wire the optional
# publish job to PyPI when ready.
on:
  push:
    tags: ["py-v*"]
  workflow_dispatch:

defaults:
  run:
    working-directory: bindings/python

jobs:
  wheels:
    name: wheels (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels (abi3 — one wheel per platform covers Python ≥ 3.9)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          command: build
          args: --release --out dist
          manylinux: auto

      - name: Smoke-test the wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip pyarrow pytest
          python -m pip install --no-index --find-links dist griotql
          python -m pytest -q

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: bindings/python/dist/*.whl

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: bindings/python/dist/*.tar.gz

  # Uncomment + add a PYPI_API_TOKEN secret to publish on tag.
