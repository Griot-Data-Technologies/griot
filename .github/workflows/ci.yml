name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  build-and-test:
    name: build · fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        run: cargo test

      - name: build (release)
        run: cargo build --release

      # Sanity-check that the examples actually run with no external services.
      - name: run examples
        run: |
          for ex in plain_sql column_masking row_filter dp_noise; do
            echo "::group::cargo run --example $ex"
            cargo run --example "$ex"
            echo "::endgroup::"
          done
